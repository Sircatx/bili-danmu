name: "Bilibili 弹幕采集"
version: "1.0.1"
slug: bili_danmu
description: "抓取 B 站直播间弹幕，按天存到 /share/danmu/（Samba 可直接查看）。游客模式，无需登录。"
url: "https://github.com/Sircatx/bili-danmu"
arch:
  - aarch64
  - amd64
  - armv7
init: false
map:
  - share:rw
options:
  room_ids: "5540720"
  push_interval: 300
  github_repo: ""
  github_token: ""
  github_branch: "main"
schema:
  room_ids: "str"
  push_interval: "int(30,)"
  github_repo: "str?"
  github_token: "password?"
  github_branch: "str?"
